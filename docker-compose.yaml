services:
  farmerbot:
    build:
      context: .
      dockerfile: Dockerfile
    image: bot:latest
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-farmerbot}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-farmerbot}
      POE2_LEAGUE: Runes of Aldur
      POE2_REFERENCE_CURRENCIES: exalted,chaos
      POE2_PRICE_LOG_DATA_POINTS: 7
      POE2_PRICE_LOG_FREQUENCY_HOURS: 1
    depends_on:
      postgres:
        condition: service_healthy

  market-ingestion:
    build:
      context: .
      dockerfile: Dockerfile
    image: bot:latest
    profiles: ["jobs"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-farmerbot}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-farmerbot}
      POE2_LEAGUE: Runes of Aldur
      POE2_REFERENCE_CURRENCIES: exalted,chaos
      POE2_PRICE_LOG_DATA_POINTS: 7
      POE2_PRICE_LOG_FREQUENCY_HOURS: 1
    command: ["python", "-m", "bot.data.pipeline"]
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-farmerbot}
      POSTGRES_USER: ${POSTGRES_USER:-farmerbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
